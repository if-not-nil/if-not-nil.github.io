title = "if err != nil"
baseURL = 'https://if-not-nil.github.io'
languageCode = 'en-us'
enableRobotsTXT = "true"

[server]
[[server.headers]]
  for = "/**.wasm"
  [server.headers.values]
    Content-Type = "application/wasm"
[[server.headers]]
  for = "/static/**"
  [server.headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[server.headers]]
  for = "/fonts/**"
  [server.headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[markup.goldmark.renderer]
	hardWraps = true
	unsafe = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params]
# "relatedtext" is the text that appears above the tag list at the bottom of pages.
    relatedtext = "related"
    favicon = "/favicon.gif"
		default_image = "/static/cat.png"
#list items
    datesinlist = true
    authorsinlist = true

#footer items
    nextprev = true
    taglist = true
    showrss = true

[privacy]
	[privacy.youTube]
		disable = false
		privacyEnhanced = true

[mediaTypes."image/webp"]
	suffixes = ["webp"]

[outputFormats]
	[outputFormats.webp]
		mediaType = "image/webp"
		relURL = true
