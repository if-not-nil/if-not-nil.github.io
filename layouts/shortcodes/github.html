{{ $user := .Get "user" }}
{{ $repo := .Get "repo" }}

{{ $url := printf "https://api.github.com/repos/%s/%s" $user $repo }}
{{ $response := resources.GetRemote $url }}
{{ $data := $response.Content | unmarshal }}

<div class="github-card">
	<div class="github-header">
		<a href="{{ $data.html_url }}" target="_blank" rel="noopener">{{$user}}/{{$repo}}</a>
	</div>

	{{ if $data.description }}
	<!-- <blockquote cite=""> -->
	<i>
		<div class="github-desc">{{ $data.description }},</div>
	</i>
	<!-- </blockquote> -->
	{{ end }}

	<!-- ...has {{ $data.stargazers_count }} stars{{ if $data.language }}, and is written in -->
	<!-- {{ $data.language }}{{ end }} -->
</div>

<style>
	.github-card {
		background: var(--rat);
		padding: 0.75rem;
		margin: 1rem 0;
		box-sizing: border-box;
		color: var(--whiterose);
	}

	.github-header {
		margin-bottom: 0.5rem;
	}

	.github-header a {
		text-decoration: none;
		color: var(--periwinkle);
		font-weight: 900;
		font-family: var(--font-mono);
		padding-bottom: 0.25rem;
		margin-bottom: 0.5rem;
	}

	.github-header a:hover {
		background: var(--periwinkle);
		color: var(--rat);
	}

	.github-desc {
		font-size: 0.9rem;
		margin-bottom: 0.5rem;
		line-height: 1.3;
	}

	.github-meta {
		display: flex;
		gap: 0.75rem;
		font-size: 0.85rem;
		color: var(--pinkrose);
		font-weight: 700;
		font-family: var(--font-mono);
	}

	.github-meta span {
		padding: 0.2rem 0.5rem;
	}
</style>
